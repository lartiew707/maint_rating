<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f4f6fb">
<title>ให้คะแนนงานซ่อมบำรุง</title>
<style>
/* ── ใส่ GAS URL ของคุณตรงนี้ ── */
/* GAS_URL ถูกกำหนดใน <script> ด้านล่าง */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',Helvetica,sans-serif;background:#f4f6fb;color:#2a2a3a;padding:20px;min-height:100vh}
.wrap{max-width:460px;margin:0 auto}
h2{text-align:center;color:#ff9800;font-size:22px;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:13px;margin-bottom:24px;word-break:break-all}
.card{background:#ffffff;border-radius:14px;padding:18px;margin-bottom:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);border:1px solid #eef0f5}
.clabel{font-size:15px;font-weight:700;color:#e08600;margin-bottom:14px;line-height:1.4}
.stars{display:flex;justify-content:center;gap:10px}
.star{font-size:42px;cursor:pointer;color:#e2e5ee;transition:color .1s;
      -webkit-tap-highlight-color:transparent;user-select:none;line-height:1}
.star.on{color:#ffc107}
.star:active{transform:scale(1.2)}
.btn{width:100%;padding:15px;background:#ff9800;color:#fff;
     font-size:18px;font-weight:700;border:none;border-radius:12px;
     cursor:pointer;margin-top:8px;letter-spacing:.5px;box-shadow:0 4px 14px rgba(255,152,0,.35)}
.btn:disabled{background:#e0e0e0;color:#aaa;box-shadow:none;cursor:default}
#done{display:none;text-align:center;padding:60px 20px}
.done-icon{font-size:64px}
.done-text{font-size:22px;color:#2e7d32;margin-top:16px;font-weight:700}
.done-sub{font-size:14px;color:#888;margin-top:8px}
#err{display:none;text-align:center;color:#d32f2f;padding:12px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <h2>⭐ ให้คะแนนงานซ่อมบำรุง</h2>
  <div class="sub" id="subtitle">กำลังโหลด...</div>

  <div id="form">
    <div class="card">
      <div class="clabel">1. ความถูกต้องการแก้ปัญหา</div>
      <div class="stars" id="g1">
        <span class="star" data-g="1" data-v="1" onclick="pick(this)">★</span>
        <span class="star" data-g="1" data-v="2" onclick="pick(this)">★</span>
        <span class="star" data-g="1" data-v="3" onclick="pick(this)">★</span>
        <span class="star" data-g="1" data-v="4" onclick="pick(this)">★</span>
        <span class="star" data-g="1" data-v="5" onclick="pick(this)">★</span>
      </div>
    </div>

    <div class="card">
      <div class="clabel">2. ความสะอาดเรียบร้อยหลังเสร็จงาน</div>
      <div class="stars" id="g2">
        <span class="star" data-g="2" data-v="1" onclick="pick(this)">★</span>
        <span class="star" data-g="2" data-v="2" onclick="pick(this)">★</span>
        <span class="star" data-g="2" data-v="3" onclick="pick(this)">★</span>
        <span class="star" data-g="2" data-v="4" onclick="pick(this)">★</span>
        <span class="star" data-g="2" data-v="5" onclick="pick(this)">★</span>
      </div>
    </div>

    <div class="card">
      <div class="clabel">3. ทำงานด้วยความปลอดภัย</div>
      <div class="stars" id="g3">
        <span class="star" data-g="3" data-v="1" onclick="pick(this)">★</span>
        <span class="star" data-g="3" data-v="2" onclick="pick(this)">★</span>
        <span class="star" data-g="3" data-v="3" onclick="pick(this)">★</span>
        <span class="star" data-g="3" data-v="4" onclick="pick(this)">★</span>
        <span class="star" data-g="3" data-v="5" onclick="pick(this)">★</span>
      </div>
    </div>

    <div class="card">
      <div class="clabel">4. คุณภาพของงานที่เสร็จ</div>
      <div class="stars" id="g4">
        <span class="star" data-g="4" data-v="1" onclick="pick(this)">★</span>
        <span class="star" data-g="4" data-v="2" onclick="pick(this)">★</span>
        <span class="star" data-g="4" data-v="3" onclick="pick(this)">★</span>
        <span class="star" data-g="4" data-v="4" onclick="pick(this)">★</span>
        <span class="star" data-g="4" data-v="5" onclick="pick(this)">★</span>
      </div>
    </div>

    <div id="err">❌ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง</div>
    <button class="btn" id="sb" disabled onclick="send()">ส่งคะแนน ✅</button>
  </div>

  <div id="done">
    <div class="done-icon">✅</div>
    <div class="done-text">ขอบคุณสำหรับการให้คะแนน!</div>
    <div class="done-sub">คะแนนของคุณถูกบันทึกเรียบร้อยแล้ว</div>
  </div>
</div>

<script>
// =========================================
// ⚠️ ใส่ URL จาก GAS Deploy ของคุณตรงนี้
const GAS_URL = "https://script.google.com/macros/s/AKfycbz5RTDzyWTkQTUUgCW5vLRtdZH4O0WwuizUTmuxILv4FNZHTE-7XqgLg8Ev6P2036vbyw/exec";
// =========================================

const sc = {1:0, 2:0, 3:0, 4:0};
const jobId = new URLSearchParams(location.search).get("jobId") || "";

document.getElementById("subtitle").textContent =
  jobId ? `งานหมายเลข: ${jobId}` : "ไม่พบรหัสงาน";

function pick(el) {
  const g = el.dataset.g;
  const v = parseInt(el.dataset.v);
  sc[g] = v;
  document.querySelectorAll(`.star[data-g="${g}"]`).forEach(s => {
    s.classList.toggle("on", parseInt(s.dataset.v) <= v);
  });
  document.getElementById("sb").disabled = !(sc[1] && sc[2] && sc[3] && sc[4]);
}

function send() {
  const sb = document.getElementById("sb");
  sb.disabled = true;
  sb.textContent = "กำลังส่ง...";
  document.getElementById("err").style.display = "none";

  fetch(GAS_URL, {
    method: "POST",
    mode:   "no-cors",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      type: "rate",
      jobId: jobId,
      r1: sc[1], r2: sc[2], r3: sc[3], r4: sc[4]
    })
  })
  .then(() => {
    document.getElementById("form").style.display = "none";
    document.getElementById("done").style.display = "block";
  })
  .catch(() => {
    sb.disabled = false;
    sb.textContent = "ส่งคะแนน ✅";
    document.getElementById("err").style.display = "block";
  });
}
</script>
</body>
</html>
